    const bytes=Uint8Array.from(atob(payload),c=>c.charCodeAt(0));
    const form=document.getElementById('form');
    const button=document.getElementById('button');
    const error=document.getElementById('error');
    form.onsubmit=async event=>{
      event.preventDefault();
      error.hidden=true;
      button.disabled=true;
      button.textContent='Decrypting…';
      try{
        const material=await crypto.subtle.importKey('raw',new TextEncoder().encode(document.getElementById('code').value),'PBKDF2',false,['deriveKey']);
        const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:bytes.slice(0,16),iterations:250000,hash:'SHA-256'},material,{name:'AES-GCM',length:256},false,['decrypt']);
        const combined=new Uint8Array(bytes.length-28);
        combined.set(bytes.slice(44),0);
        combined.set(bytes.slice(28,44),combined.length-16);
        const clear=await crypto.subtle.decrypt({name:'AES-GCM',iv:bytes.slice(16,28),tagLength:128},key,combined);
        document.open();
        document.write(new TextDecoder().decode(clear));
        document.close();
      }catch{
        await new Promise(resolve=>setTimeout(resolve,700));
        error.hidden=false;
        button.disabled=false;
        button.textContent='Decrypt Life Planner';
        document.getElementById('code').select();
      }
    };
